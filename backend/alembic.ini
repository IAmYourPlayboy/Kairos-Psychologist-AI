# Alembic configuration for Kairos.
# DATABASE_URL is taken from app.config.settings (see alembic/env.py),
# not from this file.

[alembic]
# Path to migration scripts.
script_location = alembic

# File template for new migrations.
# Example: 2026_04_30_1530-abc123_initial_tables.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Make app/ importable from env.py.
prepend_sys_path = .

# Timezone for migration filenames — uses local time.
# (Originally was "UTC" but Python on Windows lacks tzdata by default,
# and we don't need strict UTC for filenames anyway.)
# timezone = UTC

# Max slug length in filename.
truncate_slug_length = 40

# Source files (not bytecode).
sourceless = false

# Output encoding for generated migrations.
output_encoding = utf-8

# DB URL is set from app.config.settings in env.py, not here.
sqlalchemy.url =


# ============================================================================
# Loggers
# ============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
